<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Tajawal, 'Segoe UI', Arial, sans-serif" direction="rtl">
  <defs>
    <marker id="arrowTeal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#5DACA8"/>
    </marker>
    <marker id="arrowTealStart" viewBox="0 0 12 12" refX="2" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M12,0 L0,6 L12,12 z" fill="#5DACA8"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0F2A47; }
      .box   { fill: #FFFFFF; stroke: #0F2A47; stroke-width: 2; }
      .boxHi { fill: #E7F2F1; stroke: #0F2A47; stroke-width: 2; }
      .boxDk { fill: #0F2A47; stroke: #0F2A47; stroke-width: 2; }
      .lbl   { font-size: 15px; fill: #0F2A47; text-anchor: middle; }
      .lblW  { font-size: 16px; fill: #FFFFFF; text-anchor: middle; font-weight: 700; }
      .lblSm { font-size: 12px; fill: #6B6B6B; text-anchor: middle; }
      .lblBd { font-size: 13px; fill: #0F2A47; text-anchor: middle; font-weight: 600; }
      .cap   { font-size: 11px; fill: #6B6B6B; font-style: italic; text-anchor: middle; }
      .ar    { stroke: #5DACA8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="600" y="40" class="title" text-anchor="middle">تكامل منصّة الزعيم مع نظام Odoo ERP</text>

  <!-- Right side: Leadership platform -->
  <rect x="900" y="100" width="260" height="140" rx="8" class="boxDk"/>
  <text x="1030" y="135" class="lblW">منصّة الزعيم</text>
  <text x="1030" y="160" class="lblSm" fill="#E7F2F1">Public Web · Admin · Mobile</text>
  <text x="1030" y="185" class="lblSm" fill="#E7F2F1">ASP.NET Core 8 API</text>
  <text x="1030" y="215" class="lblSm" fill="#E7F2F1">SQL Server + Redis</text>

  <!-- Middle: REST API Middleware -->
  <rect x="500" y="100" width="280" height="140" rx="8" class="boxHi"/>
  <text x="640" y="135" class="lbl" font-weight="700">REST API Middleware</text>
  <text x="640" y="160" class="lblSm">JSON-RPC ↔ REST</text>
  <text x="640" y="185" class="lblSm">طبقة موائمة Adapter Layer</text>
  <text x="640" y="210" class="lblSm">تطبيع البيانات + التحقّق</text>
  <text x="640" y="232" class="lblSm">قائمة طوابير + إعادة محاولات</text>

  <!-- Left: Odoo ERP -->
  <rect x="40" y="100" width="260" height="140" rx="8" class="boxDk"/>
  <text x="170" y="135" class="lblW">Odoo ERP</text>
  <text x="170" y="160" class="lblSm" fill="#E7F2F1">المحاسبة · الموارد البشريّة</text>
  <text x="170" y="185" class="lblSm" fill="#E7F2F1">المخزون · المبيعات</text>
  <text x="170" y="215" class="lblSm" fill="#E7F2F1">CRM · التقارير</text>

  <!-- Bi-directional arrows between blocks -->
  <line x1="900" y1="155" x2="780" y2="155" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="900" y1="185" x2="780" y2="185" class="ar" marker-start="url(#arrowTealStart)"/>

  <line x1="500" y1="155" x2="300" y2="155" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="500" y1="185" x2="300" y2="185" class="ar" marker-start="url(#arrowTealStart)"/>

  <!-- Synced entities strip -->
  <rect x="40" y="310" width="1120" height="240" rx="10" fill="#E7F2F1" stroke="#0F2A47" stroke-width="2"/>
  <text x="600" y="340" class="lbl" font-weight="700">الكيانات المتزامنة بشكل ثنائي الاتّجاه</text>

  <rect x="70" y="360" width="170" height="80" rx="8" class="box"/>
  <text x="155" y="395" class="lblBd">العضويّات</text>
  <text x="155" y="418" class="lblSm">Members</text>

  <rect x="260" y="360" width="170" height="80" rx="8" class="box"/>
  <text x="345" y="395" class="lblBd">المدفوعات</text>
  <text x="345" y="418" class="lblSm">Payments</text>

  <rect x="450" y="360" width="170" height="80" rx="8" class="box"/>
  <text x="535" y="395" class="lblBd">التبرّعات</text>
  <text x="535" y="418" class="lblSm">Donations</text>

  <rect x="640" y="360" width="170" height="80" rx="8" class="box"/>
  <text x="725" y="395" class="lblBd">المخزون (المتجر)</text>
  <text x="725" y="418" class="lblSm">Inventory</text>

  <rect x="830" y="360" width="170" height="80" rx="8" class="box"/>
  <text x="915" y="395" class="lblBd">الفواتير</text>
  <text x="915" y="418" class="lblSm">Invoices</text>

  <rect x="1020" y="360" width="140" height="80" rx="8" class="box"/>
  <text x="1090" y="395" class="lblBd">الموظّفون</text>
  <text x="1090" y="418" class="lblSm">HR</text>

  <rect x="450" y="450" width="170" height="80" rx="8" class="box"/>
  <text x="535" y="485" class="lblBd">الرواتب</text>
  <text x="535" y="508" class="lblSm">Payroll</text>

  <rect x="640" y="450" width="170" height="80" rx="8" class="box"/>
  <text x="725" y="485" class="lblBd">الموردون</text>
  <text x="725" y="508" class="lblSm">Suppliers</text>

  <text x="600" y="585" class="cap">يضمن التكامل تطابق سجلّات النادي ماليّاً وإداريّاً بشكل لحظي ودون ازدواجيّة بشريّة</text>
</svg>
