<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Tajawal, 'Segoe UI', Arial, sans-serif" direction="rtl">
  <defs>
    <marker id="arrowTeal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#5DACA8"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0F2A47; }
      .box   { fill: #FFFFFF; stroke: #0F2A47; stroke-width: 2; }
      .boxHi { fill: #E7F2F1; stroke: #0F2A47; stroke-width: 2; }
      .boxDk { fill: #0F2A47; stroke: #0F2A47; stroke-width: 2; }
      .lbl   { font-size: 15px; fill: #0F2A47; text-anchor: middle; }
      .lblW  { font-size: 15px; fill: #FFFFFF; text-anchor: middle; font-weight: 700; }
      .lblSm { font-size: 12px; fill: #6B6B6B; text-anchor: middle; }
      .cap   { font-size: 11px; fill: #6B6B6B; font-style: italic; text-anchor: middle; }
      .ar    { stroke: #5DACA8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="600" y="40" class="title" text-anchor="middle">طرق تسجيل الدخول الأربع — تتقاطع عند توكن JWT الموحّد</text>

  <!-- 4 input methods (right column) -->
  <rect x="990" y="90" width="190" height="70" rx="8" class="box"/>
  <text x="1085" y="120" class="lbl">بريد + كلمة سر</text>
  <text x="1085" y="142" class="lblSm">Email + Password</text>

  <rect x="990" y="180" width="190" height="70" rx="8" class="box"/>
  <text x="1085" y="210" class="lbl">Google</text>
  <text x="1085" y="232" class="lblSm">OAuth 2.0</text>

  <rect x="990" y="270" width="190" height="70" rx="8" class="box"/>
  <text x="1085" y="300" class="lbl">Facebook</text>
  <text x="1085" y="322" class="lblSm">OAuth 2.0</text>

  <rect x="990" y="360" width="190" height="70" rx="8" class="box"/>
  <text x="1085" y="390" class="lbl">هاتف + OTP</text>
  <text x="1085" y="412" class="lblSm">iSend SMS</text>

  <!-- Arrows from inputs to reCAPTCHA gate -->
  <line x1="990" y1="125" x2="710" y2="245" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="990" y1="215" x2="710" y2="255" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="990" y1="305" x2="710" y2="275" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="990" y1="395" x2="710" y2="285" class="ar" marker-end="url(#arrowTeal)"/>

  <!-- reCAPTCHA gate -->
  <rect x="500" y="200" width="210" height="100" rx="8" class="boxHi"/>
  <text x="605" y="235" class="lbl" font-weight="700">بوّابة reCAPTCHA</text>
  <text x="605" y="260" class="lblSm">Google reCAPTCHA Enterprise</text>
  <text x="605" y="280" class="lblSm">منع الإغراق والاحتيال</text>

  <!-- Decision: pass/fail -->
  <path d="M 500 250 L 380 250" class="ar" marker-end="url(#arrowTeal)"/>
  <text x="440" y="240" class="lblSm" fill="#0F2A47">يَنجح ✓</text>

  <!-- Failure branch -->
  <path d="M 605 300 Q 605 370 480 370" class="ar" marker-end="url(#arrowTeal)"/>
  <rect x="290" y="335" width="190" height="70" rx="8" class="box"/>
  <text x="385" y="365" class="lbl">رفض الطلب</text>
  <text x="385" y="387" class="lblSm">حماية من البوتات</text>

  <!-- JWT issuance -->
  <rect x="160" y="210" width="220" height="80" rx="8" class="boxDk"/>
  <text x="270" y="245" class="lblW">إصدار توكن JWT</text>
  <text x="270" y="270" class="lblSm" fill="#E7F2F1">Access + Refresh</text>

  <!-- Final -->
  <path d="M 160 250 Q 100 250 100 320 L 100 460 Q 100 510 200 510" class="ar" marker-end="url(#arrowTeal)"/>
  <rect x="200" y="475" width="220" height="70" rx="8" class="boxHi"/>
  <text x="310" y="505" class="lbl" font-weight="700">دخول المشجّع</text>
  <text x="310" y="527" class="lblSm">إلى لوحته الشخصيّة</text>

  <text x="600" y="585" class="cap">يتوحّد المسار الأمني عبر JWT بغضّ النظر عن طريقة الدخول</text>
</svg>
