<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Tajawal, 'Segoe UI', Arial, sans-serif" direction="rtl">
  <defs>
    <marker id="arrowTeal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#5DACA8"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0F2A47; }
      .box   { fill: #FFFFFF; stroke: #0F2A47; stroke-width: 2; }
      .boxHi { fill: #E7F2F1; stroke: #0F2A47; stroke-width: 2; }
      .boxDk { fill: #0F2A47; stroke: #0F2A47; stroke-width: 2; }
      .lbl   { font-size: 15px; fill: #0F2A47; text-anchor: middle; }
      .lblW  { font-size: 16px; fill: #FFFFFF; text-anchor: middle; font-weight: 700; }
      .lblSm { font-size: 12px; fill: #6B6B6B; text-anchor: middle; }
      .lblBd { font-size: 13px; fill: #0F2A47; text-anchor: middle; font-weight: 700; }
      .cap   { font-size: 11px; fill: #6B6B6B; font-style: italic; text-anchor: middle; }
      .ar    { stroke: #5DACA8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="600" y="40" class="title" text-anchor="middle">شبكة Cloudflare العالميّة — الحماية والتسليم السريع</text>

  <!-- Users globally -->
  <rect x="970" y="220" width="200" height="120" rx="8" class="box"/>
  <text x="1070" y="255" class="lbl" font-weight="700">المستخدمون</text>
  <text x="1070" y="280" class="lblSm">عالميّاً — ليبيا</text>
  <text x="1070" y="300" class="lblSm">المهجر · الزوّار</text>
  <text x="1070" y="325" class="lblSm">Web · Mobile · TV</text>

  <!-- Cloudflare ring -->
  <ellipse cx="600" cy="280" rx="240" ry="180" fill="#E7F2F1" stroke="#5DACA8" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="600" y="120" class="lbl" font-weight="700" text-anchor="middle">شبكة Cloudflare — +300 موقع حول العالم</text>

  <rect x="430" y="180" width="160" height="60" rx="8" class="boxDk"/>
  <text x="510" y="210" class="lblW">WAF</text>
  <text x="510" y="230" class="lblSm" fill="#E7F2F1">جدار حماية تطبيقات</text>

  <rect x="600" y="180" width="160" height="60" rx="8" class="boxDk"/>
  <text x="680" y="210" class="lblW">DDoS Mitigation</text>
  <text x="680" y="230" class="lblSm" fill="#E7F2F1">دفع هجمات الإغراق</text>

  <rect x="430" y="260" width="160" height="60" rx="8" class="boxDk"/>
  <text x="510" y="290" class="lblW">DNS سريع</text>
  <text x="510" y="310" class="lblSm" fill="#E7F2F1">1.1.1.1 Anycast</text>

  <rect x="600" y="260" width="160" height="60" rx="8" class="boxDk"/>
  <text x="680" y="290" class="lblW">CDN Cache</text>
  <text x="680" y="310" class="lblSm" fill="#E7F2F1">صور · أصول ثابتة</text>

  <rect x="490" y="340" width="220" height="70" rx="8" fill="#5DACA8" stroke="#0F2A47" stroke-width="2"/>
  <text x="600" y="370" class="lbl" font-weight="700" fill="#FFFFFF">Cloudflare Stream</text>
  <text x="600" y="392" class="lblSm" fill="#FFFFFF">البثّ المباشر للمباريات والفعاليّات</text>

  <line x1="970" y1="280" x2="840" y2="280" class="ar" marker-end="url(#arrowTeal)"/>

  <!-- Origin: Leadership API -->
  <rect x="40" y="220" width="220" height="120" rx="8" class="boxDk"/>
  <text x="150" y="255" class="lblW">API الزعيم</text>
  <text x="150" y="280" class="lblSm" fill="#E7F2F1">api.ittihadclub.ly</text>
  <text x="150" y="305" class="lblSm" fill="#E7F2F1">IIS + ASP.NET Core 8</text>
  <text x="150" y="328" class="lblSm" fill="#E7F2F1">SQL Server + Redis</text>

  <line x1="360" y1="280" x2="260" y2="280" class="ar" marker-end="url(#arrowTeal)"/>

  <!-- Benefit footer -->
  <rect x="100" y="460" width="1000" height="80" rx="10" class="boxHi"/>
  <text x="600" y="490" class="lblBd">جدار حماية + شهادة SSL مجانيّة + ضغط Brotli + Anycast + كاش ذكي + بثّ مرئي بدون تطوير منفصل</text>
  <text x="600" y="515" class="lblSm">يقفز زمن استجابة المستخدم في طرابلس إلى أقلّ من 80ms عبر أقرب نقطة (Tunis / Cairo / Frankfurt)</text>

  <text x="600" y="580" class="cap">طبقة حماية وأداء عالميّة لا تحتاج بنية تحتيّة محليّة</text>
</svg>
