<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Tajawal, 'Segoe UI', Arial, sans-serif" direction="rtl">
  <defs>
    <marker id="arrowTeal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#5DACA8"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0F2A47; }
      .box   { fill: #FFFFFF; stroke: #0F2A47; stroke-width: 2; }
      .boxHi { fill: #E7F2F1; stroke: #0F2A47; stroke-width: 2; }
      .boxDk { fill: #0F2A47; stroke: #0F2A47; stroke-width: 2; }
      .lbl   { font-size: 15px; fill: #0F2A47; text-anchor: middle; }
      .lblW  { font-size: 16px; fill: #FFFFFF; text-anchor: middle; font-weight: 700; }
      .lblSm { font-size: 12px; fill: #6B6B6B; text-anchor: middle; }
      .lblBd { font-size: 14px; fill: #0F2A47; text-anchor: middle; font-weight: 700; }
      .cap   { font-size: 11px; fill: #6B6B6B; font-style: italic; text-anchor: middle; }
      .ar    { stroke: #5DACA8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="600" y="40" class="title" text-anchor="middle">تكامل خدمة الرسائل النصّيّة عبر iSend</text>

  <!-- Source: Leadership platform -->
  <rect x="930" y="220" width="240" height="120" rx="8" class="boxDk"/>
  <text x="1050" y="260" class="lblW">منصّة الزعيم</text>
  <text x="1050" y="285" class="lblSm" fill="#E7F2F1">API ASP.NET Core</text>
  <text x="1050" y="310" class="lblSm" fill="#E7F2F1">/api/sms/dispatch</text>
  <text x="1050" y="328" class="lblSm" fill="#E7F2F1">Rate-limit + Retry</text>

  <!-- iSend gateway -->
  <rect x="540" y="220" width="240" height="120" rx="8" class="boxHi"/>
  <text x="660" y="260" class="lbl" font-weight="700">iSend API</text>
  <text x="660" y="285" class="lblSm">isend.com.ly</text>
  <text x="660" y="310" class="lblSm">/api/v3/sms/send</text>
  <text x="660" y="328" class="lblSm">جسر موحّد لجميع الشبكات</text>

  <line x1="930" y1="280" x2="780" y2="280" class="ar" marker-end="url(#arrowTeal)"/>

  <!-- 3 carriers -->
  <rect x="40" y="120" width="380" height="380" rx="10" fill="#E7F2F1" stroke="#0F2A47" stroke-width="2"/>
  <text x="230" y="155" class="lbl" font-weight="700">شبكات الاتّصالات الليبيّة</text>

  <rect x="80" y="180" width="300" height="80" rx="8" class="box"/>
  <text x="230" y="215" class="lblBd">ليبيانا</text>
  <text x="230" y="240" class="lblSm">Libyana — أكبر مزوّد خلوي</text>

  <rect x="80" y="280" width="300" height="80" rx="8" class="box"/>
  <text x="230" y="315" class="lblBd">المدار الجديد</text>
  <text x="230" y="340" class="lblSm">Almadar Aljadid</text>

  <rect x="80" y="380" width="300" height="80" rx="8" class="box"/>
  <text x="230" y="415" class="lblBd">LTT</text>
  <text x="230" y="440" class="lblSm">Libya Telecom &amp; Technology</text>

  <line x1="540" y1="260" x2="420" y2="220" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="540" y1="280" x2="420" y2="320" class="ar" marker-end="url(#arrowTeal)"/>
  <line x1="540" y1="300" x2="420" y2="420" class="ar" marker-end="url(#arrowTeal)"/>

  <!-- Use cases strip -->
  <text x="850" y="420" class="lbl" font-weight="700" text-anchor="middle">حالات الاستخدام</text>

  <rect x="780" y="440" width="140" height="60" rx="6" class="box"/>
  <text x="850" y="468" class="lblBd">OTP</text>
  <text x="850" y="488" class="lblSm">تحقّق الدخول</text>

  <rect x="930" y="440" width="160" height="60" rx="6" class="box"/>
  <text x="1010" y="468" class="lblBd">إشعارات المباريات</text>
  <text x="1010" y="488" class="lblSm">جدول · نتائج · تشكيلات</text>

  <rect x="780" y="510" width="310" height="60" rx="6" class="box"/>
  <text x="935" y="538" class="lblBd">حملات العضويّة والتسويق</text>
  <text x="935" y="558" class="lblSm">قوائم استهداف · جدولة</text>

  <text x="600" y="595" class="cap">قناة موثوقة وموثّقة — تغطية كاملة داخل ليبيا مع تسجيل لكلّ رسالة في سجلّ التدقيق</text>
</svg>
